; PlatformIO project config for the Octobot ESP32 motor driver.
; Open the esp32/ folder in VS Code with the PlatformIO extension installed.
; PlatformIO handles the toolchain, ESP32 Arduino core, and all libraries
; automatically — no Arduino IDE required.
;
; If your board is not a generic ESP32 DevKit, change the board value.
; Common alternatives:
;   esp32-s3-devkitc-1   (ESP32-S3)
;   esp32-c3-devkitm-1   (ESP32-C3)
;   lolin_s2_mini        (Wemos S2 Mini)
; Full list: https://registry.platformio.org/platforms/platformio/espressif32/boards

[env:esp32dev]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Route Serial to UART0 (the UART/COM bridge chip) instead of native USB CDC.
; Required to see Serial output when connected to the UART port.
build_flags = -DARDUINO_USB_CDC_ON_BOOT=0

; Library dependencies — PlatformIO fetches these automatically on first build.
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    tzapu/WiFiManager     @ ^2.0.17

monitor_speed = 115200
upload_speed  = 921600
