<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<meta http-equiv="Cache-Control" content="no-store" />
		<meta http-equiv="Pragma" content="no-cache" />
		<title>Pipi</title>
		<link rel="stylesheet" href="style.css?v=dev" />
	</head>
	<body>
		<section id="setup">
			<h1>Pipi</h1>
			<p>Phone-powered robot face and control.</p>
			<div class="panel">
				<button id="startAll" class="primary">Start robot</button>
				<div class="controls">
					<label>
						Voice
						<select id="ttsProvider">
							<option value="elevenlabs">ElevenLabs pibot</option>
							<option value="pocket">Kyutai Pocket</option>
						</select>
					</label>
					<button id="resetSession">Reset session</button>
				</div>
			</div>
			<div id="gyroStatus" class="status">Gyro: not active</div>
			<pre id="log"></pre>
		</section>
		<section id="robot" hidden>
			<div id="face" class="face inactive">
				<div class="brow left"></div>
				<div class="brow right"></div>
				<div class="eye left"></div>
				<div class="eye right"></div>
			</div>
			<button id="back">setup</button>
		</section>
		<script src="app.js?v=dev"></script>
	</body>
</html>
