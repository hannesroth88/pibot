<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<meta http-equiv="Cache-Control" content="no-store" />
		<meta http-equiv="Pragma" content="no-cache" />
		<title>Pipi</title>
		<link rel="stylesheet" href="style.css?v=dev" />
		<script>window.__USB_ENABLED__=__USB_ENABLED__;</script>
	</head>
	<body>
		<section id="auth" class="auth-panel">
			<h1>Pipi</h1>
			<p>Sign in to use the robot.</p>
			<form id="loginForm" class="panel">
				<label>
					Name
					<input id="loginName" name="name" autocomplete="username" required />
				</label>
				<label>
					Password
					<input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
				</label>
				<button class="primary" type="submit">sign in</button>
				<p id="loginError" class="error-text"></p>
			</form>
		</section>
		<section id="setup" hidden>
			<h1>Pipi</h1>
			<p>Phone-powered robot.</p>
			<div id="setupFaceHost" class="setup-face-host"></div>
			<robot-setup-panel id="setupPanel"></robot-setup-panel>
			<spotify-panel id="spotifyPanel" hidden></spotify-panel>
			<robot-log id="log"></robot-log>
		</section>
		<section id="robot" hidden>
			<robot-face-webgl id="face" state="inactive"></robot-face-webgl>
			<div id="spotifyNowPlaying" class="spotify-now-playing" hidden></div>
			<button id="back">setup</button>
		</section>
		<script src="app.js?v=dev"></script>
	</body>
</html>
