<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<meta http-equiv="Cache-Control" content="no-store" />
		<meta http-equiv="Pragma" content="no-cache" />
		<title>Pipi</title>
		<link rel="stylesheet" href="style.css?v=dev" />
	</head>
	<body>
		<section id="setup">
			<h1>Pipi</h1>
			<p>Phone-powered robot.</p>
			<div id="setupFaceHost" class="setup-face-host"></div>
			<robot-setup-panel id="setupPanel"></robot-setup-panel>
			<spotify-panel id="spotifyPanel" hidden></spotify-panel>
			<robot-log id="log"></robot-log>
		</section>
		<section id="robot" hidden>
			<robot-face id="face" state="inactive"></robot-face>
			<div id="spotifyNowPlaying" class="spotify-now-playing" hidden></div>
			<button id="back">setup</button>
		</section>
		<script src="app.js?v=dev"></script>
	</body>
</html>
